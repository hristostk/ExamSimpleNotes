name: .NET

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
    - name: Restore the packages
      run: dotnet restore SimpleNotesExam/SimpleNotesExam
    - name: Build the solution
      run: dotnet build SimpleNotesExam/SimpleNotesExam --no-restore
    - name: Run all Test
      run: dotnet test SimpleNotesExam/SimpleNotesExam --no-build --verbosity normal
